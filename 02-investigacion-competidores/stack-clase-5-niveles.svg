    <rect x="80" y="260" width="850" height="100" rx="12" fill="url(#g4)" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle cx="125" cy="310" r="28" fill="#ef4444" fill-opacity="0.25" stroke="#ef4444" stroke-width="2"/>
    <text x="125" y="318" text-anchor="middle" font-size="22" font-weight="700" fill="#c93636">4</text>
    <text x="175" y="292" font-size="17" font-weight="700" fill="#111">Cuando Google bloquea · stealth profesional</text>
    <text x="175" y="318" font-size="13" font-weight="600" fill="#222">Nodriver · Patchright · Camoufox · undetected-chromedriver</text>
    <text x="175" y="340" font-size="13" fill="#555">Narrativa: el «limited view» de Maps (feb 2026) mató al scraping ingenuo · zona gris, uso ético</text>
