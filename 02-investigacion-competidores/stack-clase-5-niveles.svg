  </g>
  <text x="35" y="400" text-anchor="middle" font-size="12" fill="#666" transform="rotate(-90 35 400)" letter-spacing="2">PROFUNDIDAD · WOW FACTOR</text>

  <!-- Nivel 1: Apertura suave -->
  <g>
    <rect x="80" y="620" width="850" height="100" rx="12" fill="url(#g1)" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle cx="125" cy="670" r="28" fill="#10b981" fill-opacity="0.25" stroke="#10b981" stroke-width="2"/>
    <text x="125" y="678" text-anchor="middle" font-size="22" font-weight="700" fill="#0a8862">1</text>
