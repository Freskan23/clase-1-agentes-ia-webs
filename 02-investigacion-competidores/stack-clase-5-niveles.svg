<svg viewBox="0 0 960 760" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ef4444" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0.05"/>
