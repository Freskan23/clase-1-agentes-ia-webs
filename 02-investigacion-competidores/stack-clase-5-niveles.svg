    <text x="855" y="172" text-anchor="end" font-size="11" font-weight="700" fill="#b87807" letter-spacing="1.5">⭐ MOMENTO ESTRELLA</text>
  </g>

  <!-- Footer -->
  <text x="480" y="745" text-anchor="middle" font-size="11" fill="#666">
    Audiencia SEO/marketers · prioridad: capacidades técnicas → precio/calidad → facilidad → velocidad
  </text>
</svg>
