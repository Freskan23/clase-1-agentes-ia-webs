    <rect x="80" y="140" width="850" height="100" rx="12" fill="url(#g5)" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="125" cy="190" r="28" fill="#f59e0b" fill-opacity="0.30" stroke="#f59e0b" stroke-width="2.5"/>
