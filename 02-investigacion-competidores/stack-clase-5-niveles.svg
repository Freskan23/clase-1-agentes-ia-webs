    <text x="175" y="700" font-size="13" fill="#555">Demo: «audita el competidor 1» → Lighthouse + sitemap + robots + links rotos en 30s</text>
  </g>

  <!-- Nivel 2: Profundidad técnica -->
  <g>
    <rect x="80" y="500" width="850" height="100" rx="12" fill="url(#g2)" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle cx="125" cy="550" r="28" fill="#06b6d4" fill-opacity="0.25" stroke="#06b6d4" stroke-width="2"/>
    <text x="125" y="558" text-anchor="middle" font-size="22" font-weight="700" fill="#0588a0">2</text>
    <text x="175" y="532" font-size="17" font-weight="700" fill="#111">Profundidad técnica · 30 herramientas SEO</text>
    <text x="175" y="558" font-size="13" font-weight="600" fill="#222">mcp-seo-audit (GiorgiKemo, self-hosted) · GSC + CrUX + PSI + Lighthouse local + on-page</text>
